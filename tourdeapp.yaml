# $schema: https://portalbush.tourde.cloud/static/schema.json
exposedPort: 80
containers:
  - name: db
    image: postgres
    tag: "16-alpine"
    port: 5432
    env:
      POSTGRES_DB: coursesportal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
  - name: server
    image: registry.tourde.cloud/pacmani/server
    port: 3000
    command: sh -c "npx prisma db push --schema=prisma/schema.prisma && npx ts-node prisma/seed.ts && node dist/src/index.js"
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/coursesportal?schema=public
      CORS_ORIGIN: https://pacmani-v20audsx.tourde.app
      JWT_SECRET: secretkey
      NODE_ENV: production
  - name: web
    image: registry.tourde.cloud/pacmani/web
    port: 3001
    env:
      NODE_ENV: production
  - name: caddy
    image: registry.tourde.cloud/pacmani/caddy
    port: 80
build:
  - name: server
    context: ./apps/server
    dockerfile: ./apps/server/Dockerfile
  - name: web
    context: ./apps/web
    dockerfile: ./apps/web/Dockerfile
  - name: caddy
    context: ./apps/caddy
    dockerfile: ./apps/caddy/Dockerfile
